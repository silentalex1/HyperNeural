<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corenode - Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://rebootcord.world/sdk/rebootui.js"></script>
    <link rel="stylesheet" href="user.css">
</head>
<body class="bg-[#030303] text-gray-200 font-sans min-h-screen overflow-hidden flex items-center justify-center relative">

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
        <div id="glow-bg" class="absolute w-[600px] h-[600px] rounded-full bg-gradient-to-r from-cyan-500/10 to-cyan-800/10 blur-[150px]"></div>
    </div>

    <main class="relative z-10 w-full max-w-md px-6">
        <div class="bg-white/[0.02] border border-white/5 backdrop-blur-xl rounded-2xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.5)]">
            
            <div class="flex items-center justify-center mb-8 gap-3">
                <div class="relative w-8 h-8 flex items-center justify-center">
                    <div class="absolute inset-0 bg-cyan-500 rotate-45 rounded-sm"></div>
                    <div class="absolute inset-1 bg-[#030303] rotate-45 rounded-sm flex items-center justify-center">
                        <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></div>
                    </div>
                </div>
                <span class="text-xl font-bold tracking-wider text-white">CORE<span class="text-cyan-400">NODE</span></span>
            </div>

            <div class="flex gap-6 text-sm font-semibold text-gray-500 border-b border-white/5 pb-4 mb-6">
                <button id="tab-signup" class="text-cyan-400 border-b-2 border-cyan-400 pb-4 -mb-4 transition-all">Create account.</button>
                <button id="tab-login" class="hover:text-gray-300 pb-4 -mb-4 transition-all">login</button>
            </div>

            <div id="view-signup" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                    <input type="text" id="signup-user" placeholder="enter username" class="w-full bg-[#050505] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder-gray-600">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="signup-pass" placeholder="enter password" class="w-full bg-[#050505] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder-gray-600">
                </div>
                <button id="btn-signup" class="w-full mt-4 px-6 py-3.5 bg-cyan-500 text-black font-bold rounded-lg hover:bg-cyan-400 transition-all shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                    create account
                </button>
            </div>

            <div id="view-login" class="space-y-5 hidden">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                    <input type="text" id="login-user" placeholder="enter username" class="w-full bg-[#050505] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder-gray-600">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="login-pass" placeholder="enter password" class="w-full bg-[#050505] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder-gray-600">
                </div>
                <button id="btn-login" class="w-full mt-4 px-6 py-3.5 bg-white/[0.05] hover:bg-white/[0.1] text-white border border-white/10 font-bold rounded-lg transition-all hover:border-cyan-500/30">
                    login to account.
                </button>
            </div>

        </div>
    </main>

    <script src="user.js"></script>
</body>
</html>
