<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white flex min-h-screen">
    <aside class="w-64 border-r border-white/[0.08] p-6">
        <h1 class="text-xl font-bold mb-8">CORE<span class="text-cyan-400">NODE</span></h1>
        <button onclick="document.getElementById('upload-modal').classList.remove('hidden')" class="w-full bg-cyan-500 text-black font-bold py-2 rounded-lg mb-8">Upload your AI</button>
        <nav class="space-y-4 text-sm text-gray-400">
            <div onclick="window.location.reload()" class="cursor-pointer hover:text-white">Dashboard</div>
            <div onclick="loadModels()" class="cursor-pointer hover:text-white">Models</div>
        </nav>
    </aside>
    <main class="flex-1 p-10" id="content">
        <h1 class="text-3xl font-bold mb-8">Dashboard</h1>
        <div id="models-grid" class="grid grid-cols-1 gap-6"></div>
    </main>

    <div id="upload-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-[#0d0d0d] border border-white/[0.08] p-8 rounded-xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Upload Project</h2>
            <input type="text" id="model-name" placeholder="Model Name" class="w-full bg-[#050505] border border-white/[0.08] p-3 mb-4 rounded-lg outline-none">
            <input type="file" id="file-input" webkitdirectory directory class="w-full mb-4">
            <button onclick="handleUpload()" class="w-full bg-cyan-500 text-black font-bold py-2 rounded-lg">Upload</button>
        </div>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-[#0d0d0d] border border-white/[0.08] p-8 rounded-xl text-center">
            <h2 id="congrats-text" class="text-xl font-bold mb-4"></h2>
            <code id="api-link" class="block bg-black p-3 mb-4 rounded text-cyan-400 text-sm"></code>
            <button onclick="completeUpload()" class="bg-cyan-500 text-black px-6 py-2 rounded-lg font-bold">Complete</button>
        </div>
    </div>

    <div id="notification" class="hidden fixed bottom-5 right-5 bg-cyan-500 text-black px-6 py-3 rounded-lg font-bold shadow-lg"></div>

    <script>
        const username = window.location.pathname.split('/').pop();
        
        async function handleUpload() {
            const name = document.getElementById('model-name').value;
            const res = await fetch('/api/models/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username, name })});
            const data = await res.json();
            document.getElementById('upload-modal').classList.add('hidden');
            document.getElementById('congrats-text').innerText = `Congrats with your first AI model of ${name}`;
            document.getElementById('api-link').innerText = `https://api.corenode.com/v1/models/${data.model.id}/generate`;
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function completeUpload() {
            document.getElementById('success-modal').classList.add('hidden');
            const note = document.getElementById('notification');
            note.innerText = "Model has been created!";
            note.classList.remove('hidden');
            setTimeout(() => note.classList.add('hidden'), 3000);
            loadModels();
        }

        async function loadModels() {
            const res = await fetch(`/api/models/${username}`);
            const models = await res.json();
            const grid = document.getElementById('models-grid');
            grid.innerHTML = models.map(m => `
                <div class="bg-[#0d0d0d] border border-white/[0.08] p-6 rounded-xl">
                    <h3 class="text-xl font-bold">${m.name}</h3>
                    <p class="text-green-500 text-sm">Status: ${m.status}</p>
                    <code class="block text-xs text-gray-500 mt-2 mb-4">https://api.corenode.com/v1/models/${m.id}/generate</code>
                    <button class="text-cyan-400 border border-cyan-400 px-4 py-1 rounded text-sm">More Details</button>
                </div>
            `).join('');
        }
        loadModels();
    </script>
</body>
</html>
