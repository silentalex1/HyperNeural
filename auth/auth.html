<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in HyperNeural</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
<a href="/" class="auth-brand">
  <span class="brand-name">HyperNeural</span>
</a>

<main class="auth-shell">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="create">Create Account</button>
      <button class="auth-tab" data-tab="login">Login</button>
    </div>

    <form id="create-form" class="auth-form">
      <h1>Create your account.</h1>
      <label class="field-label" for="create-username">Username</label>
      <input id="create-username" class="field-input" type="text" placeholder="Enter your username" autocomplete="username" required>

      <label class="field-label" for="create-password">Password</label>
      <input id="create-password" class="field-input" type="password" placeholder="Enter your password" autocomplete="new-password" required>

      <p class="form-error" id="create-error"></p>

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <form id="login-form" class="auth-form hidden">
      <h1>Login to your account.</h1>
      <label class="field-label" for="login-username">Username</label>
      <input id="login-username" class="field-input" type="text" placeholder="Enter in your username" autocomplete="username" required>

      <label class="field-label" for="login-password">Password</label>
      <input id="login-password" class="field-input" type="password" placeholder="Enter in your password" autocomplete="current-password" required>

      <p class="form-error" id="login-error"></p>

      <button type="submit" class="btn btn-primary btn-block">Login to your account</button>
    </form>
  </div>
</main>

<script src="/auth/auth.js"></script>
</body>
</html>
