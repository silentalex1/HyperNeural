<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - Corenode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body class="bg-[#030303] text-gray-200 min-h-screen p-10 font-sans">
    <button onclick="window.history.back()" class="text-cyan-400 hover:underline mb-8 inline-block">&larr; Back to Dashboard</button>
    <div class="max-w-4xl mx-auto bg-[#0a0a0a] border border-[#1f1f1f] p-10 rounded-2xl">
        <h1 class="text-4xl font-bold text-white mb-6">Corenode API Documentation</h1>

        <h2 class="text-2xl font-bold text-white mt-8 mb-4">Authentication</h2>
        <p class="text-gray-400 mb-4">All API requests require an API key passed via the Authorization header.</p>
        <code class="block bg-[#050505] p-4 rounded-xl text-cyan-400 font-mono text-sm border border-[#1f1f1f]">Authorization: Bearer ak_live_xxxx</code>
    </div>
